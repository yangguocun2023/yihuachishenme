<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一会吃什么 - 附近美食搜索</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: 'b2263a841a60c8538ee76f2e894a27d3',
        }
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=09238325a587c3b5438c10d25d98fca7&plugin=AMap.Geolocation,AMap.PlaceSearch,AMap.Geocoder,AMap.CitySearch,AMap.AutoComplete"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🍽️ 一会吃什么</h1>
            <p class="subtitle">附近美食一键搜索</p>
        </header>

        <div class="search-section">
            <div class="search-main">
                <div class="search-box">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="address-input" 
                            placeholder="输入地址或点击定位"
                            autocomplete="off"
                        >
                        <div id="address-suggestions" class="address-suggestions"></div>
                    </div>
                    <div class="buttons-row">
                        <button id="locate-btn" class="locate-btn" title="获取当前位置">
                            <svg viewBox="0 0 24 24" width="18" height="18">
                                <path fill="currentColor" d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
                            </svg>
                            <span>定位</span>
                        </button>
                        <button id="search-btn" class="search-btn">
                            <svg viewBox="0 0 24 24" width="18" height="18">
                                <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                            </svg>
                            搜索
                        </button>
                    </div>
                </div>

                <div class="filter-tabs">
                    <div class="filter-group">
                        <span class="filter-label">范围:</span>
                        <div class="tabs" id="range-tabs">
                            <button class="tab-btn active" data-range="500">500m</button>
                            <button class="tab-btn" data-range="1000">1km</button>
                            <button class="tab-btn" data-range="3000">3km</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="map-container" class="map-container"></div>
        </div>

        <div class="category-tabs">
            <button class="category-btn active" data-category="all">全部</button>
            <button class="category-btn" data-category="restaurant">餐厅</button>
            <button class="category-btn" data-category="drink">茶饮</button>
        </div>

        <div id="result-info" class="result-info" style="display: none;">
            <span id="result-count">0</span> 家美食店
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>正在搜索美食...</p>
        </div>

        <div id="restaurant-list" class="restaurant-list"></div>

        <div id="error-message" class="error-message" style="display: none;"></div>
    </div>

    <button id="random-btn" class="random-btn">
        <span>🎲</span> 帮我选
    </button>

    <script src="script.js"></script>
</body>
</html>
